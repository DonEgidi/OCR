services:
  # Database
  db:
    image: postgres:15-alpine
    container_name: ocr_db
    environment:
      POSTGRES_DB: ocr_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - ocr_db_data:/var/lib/postgresql/data
      - ./backend/shared/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - microservices_network
    restart: unless-stopped

  # Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ocr_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - microservices_network
    restart: unless-stopped

  # Microservicio FTP
  ftp-api:
    build:
      context: ./backend/FTP/api
      dockerfile: Dockerfile
    container_name: ftp_api_ocr
    environment:
      FTP_HOST: ftp
      FTP_PORT: 21
      FTP_USER: ftpuser
      FTP_PASSWORD: ftppass
      FTP_BASE_PATH: /home/ftpuser
    ports:
      - "8007:8007"
    depends_on:
      - ftp
    networks:
      - microservices_network
    restart: unless-stopped

  # Servidor FTP
  ftp:
    image: fauria/vsftpd
    container_name: ftp_server_ocr
    environment:
      FTP_USER: ftpuser
      FTP_PASS: ftppass
      PASV_ADDRESS: 127.0.0.1
      PASV_MIN_PORT: 21100
      PASV_MAX_PORT: 21110
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
    volumes:
      - ftp_data:/home/ftpuser
    networks:
      - microservices_network
    restart: unless-stopped

  # Key Manager Service
  key-manager:
    build: ./backend/key-manager
    container_name: key_manager
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/ocr_db
      PYTHONUNBUFFERED: "1"
    depends_on:
      - db
    networks:
      - microservices_network
    restart: unless-stopped

  # OCR Service
  ocr-service:
    build: ./backend/ocr-service
    container_name: ocr_service
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      KEY_MANAGER_URL: http://key-manager:8000
      FTP_API_URL: http://ftp-api:8007
      PYTHONUNBUFFERED: "1"
    depends_on:
      - rabbitmq
      - key-manager
      - ftp-api
    networks:
      - microservices_network
    restart: unless-stopped

  # LLM JSON Service
  llm-service:
    build: ./backend/llm-service
    container_name: llm_service
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      KEY_MANAGER_URL: http://key-manager:8000
      PYTHONUNBUFFERED: "1"
    depends_on:
      - rabbitmq
      - key-manager
    networks:
      - microservices_network
    restart: unless-stopped

  # API Gateway
  api-gateway:
    build: ./backend/api-gateway
    container_name: api_gateway
    ports:
      - "8000:8000"
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DATABASE_URL: postgresql://user:password@db:5432/ocr_db
      FTP_API_URL: http://ftp-api:8007
      PYTHONUNBUFFERED: "1"
    depends_on:
      - db
      - rabbitmq
      - ftp-api
    networks:
      - microservices_network
    restart: unless-stopped

  # Frontend Dashboard
  dashboard:
    build: ./frontend/dashboard
    container_name: ocr_dashboard
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - microservices_network
    restart: unless-stopped

networks:
  microservices_network:
    driver: bridge

volumes:
  ocr_db_data:
  ftp_data:
